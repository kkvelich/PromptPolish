name: PromptPolish
options:
  bundleIdPrefix: com.velicheti.promptpolish
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  PromptPolish:
    type: application
    platform: iOS
    sources:
      - PromptPolish
      - Shared
    info:
      path: PromptPolish/Info.plist
      properties:
        CFBundleDisplayName: PromptPolish
        UILaunchScreen: {}
        NSMicrophoneUsageDescription: PromptPolish needs the microphone so you can dictate prompts.
        NSSpeechRecognitionUsageDescription: PromptPolish uses on-device speech recognition to turn your voice into text before polishing it into a prompt.
        UIApplicationSupportedOrientations:
          - UIInterfaceOrientationPortrait
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.velicheti.promptpolish
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        CODE_SIGN_ENTITLEMENTS: PromptPolish/PromptPolish.entitlements
    dependencies:
      - target: PromptPolishKeyboard

  PromptPolishKeyboard:
    type: app-extension
    platform: iOS
    sources:
      - PromptPolishKeyboard
      - Shared
    info:
      path: PromptPolishKeyboard/Info.plist
      properties:
        CFBundleDisplayName: PromptPolish
        NSExtension:
          NSExtensionAttributes:
            IsASCIICapable: false
            PrefersRightToLeft: false
            PrimaryLanguage: en-US
            RequestsOpenAccess: true
          NSExtensionPointIdentifier: com.apple.keyboard-service
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).KeyboardViewController
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.velicheti.promptpolish.keyboard
        CODE_SIGN_ENTITLEMENTS: PromptPolishKeyboard/PromptPolishKeyboard.entitlements

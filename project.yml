name: PromptPolish
options:
  bundleIdPrefix: com.velicheti.promptpolish
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true

# Localization regions — XcodeGen creates a localized variant group for .strings files in *.lproj
knownRegions:
  - en
  - te

settings:
  base:
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: 32J9C9766C
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    # User-visible version. Bumped to 1.1 for the v2 feature set
    # (polish style, target AI, languages, personal facts, Telugu).
    MARKETING_VERSION: "1.1"
    # Build number. Xcode's "Manage Version and Build Number" auto-bumps
    # this on each Archive. Starts at 1 for the first 1.1 build.
    CURRENT_PROJECT_VERSION: "1"

targets:
  PromptPolish:
    type: application
    platform: iOS
    sources:
      - PromptPolish
      - Shared
    info:
      path: PromptPolish/Info.plist
      properties:
        CFBundleDisplayName: PromptPolish
        UILaunchScreen: {}
        NSMicrophoneUsageDescription: PromptPolish needs the microphone so you can dictate prompts.
        NSSpeechRecognitionUsageDescription: PromptPolish uses on-device speech recognition to turn your voice into text before polishing it into a prompt.
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.velicheti.promptpolish
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: PromptPolish/PromptPolish.entitlements
    dependencies:
      - target: PromptPolishKeyboard

  PromptPolishTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - PromptPolishTests
      - Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.velicheti.promptpolish.tests
        GENERATE_INFOPLIST_FILE: YES

  PromptPolishKeyboard:
    type: app-extension
    platform: iOS
    sources:
      - PromptPolishKeyboard
      - Shared
    info:
      path: PromptPolishKeyboard/Info.plist
      properties:
        CFBundleDisplayName: PromptPolish
        NSExtension:
          NSExtensionAttributes:
            IsASCIICapable: false
            PrefersRightToLeft: false
            PrimaryLanguage: en-US
            RequestsOpenAccess: true
          NSExtensionPointIdentifier: com.apple.keyboard-service
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).KeyboardViewController
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.velicheti.promptpolish.keyboard
        CODE_SIGN_ENTITLEMENTS: PromptPolishKeyboard/PromptPolishKeyboard.entitlements

schemes:
  PromptPolish:
    build:
      targets:
        PromptPolish: all
    run:
      config: Debug
      executable: PromptPolish
    test:
      config: Debug
      targets:
        - PromptPolishTests
    archive:
      config: Release

  PromptPolishTests:
    build:
      targets:
        PromptPolishTests: all
    test:
      config: Debug
      targets:
        - PromptPolishTests
